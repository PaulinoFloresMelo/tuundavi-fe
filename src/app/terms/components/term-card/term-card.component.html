
<div class="card w-full min-w-[150px] max-w-sm md:min-w-[200px] max-h-[400px] md:max-w-xl bg-base-100 shadow-xl animate-fadeIn">
  <figure class="px-3 pt-3">
    <!--[src]= "imageUrl()" -->
    <img
      [src]="imageUrl() | termImage"
      [alt]="term().content" />
  </figure>
  <!-- <div class="card-body min-h-[140px] "> -->
  <div class="card-body ">
    <h2 
      class="card-title text-accent text-lg hover:underline cursor-pointer"
      [routerLink]="['/term', term().id]" >
        {{term().content}}
    </h2>
    <p> {{term().meaning}}  </p>
    <!-- <p> {{term().example | slice: 0:70 }}...</p> -->

    <audio #audioPlayer class="hidden">
      <source [src]="term().audioUrl | termAudio" type="audio/mpeg">
      Tu navegador no soporta el elemento de audio.
    </audio>
        
    <div class="card-actions justify-end">
      <!-- <a class="link link-accent" [routerLink]="['/term', term().imageUrl]">Ver termino</a> -->
      <button class="btn btn-sm btn-accent" (click)="playAudio()"
        >Escuchar
      
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 26 26">
        <path fill="currentColor" d="M12.031 1.063c-.321.001-.676.145-1 .468L5.312 8H1c-.551 0-1 .449-1 1v8c0 .551.449 1 1 1h4.313L11 24.438c1 1 2 .488 2-.875V2.28c0-.791-.433-1.222-.969-1.219zm7.25 2a1 1 0 0 0-.218 1.906A8.96 8.96 0 0 1 24 13c0 3.524-2 6.55-4.938 8.031a1 1 0 1 0 .875 1.782C23.53 21 26 17.288 26 13s-2.471-8-6.063-9.813a1 1 0 0 0-.562-.124a1 1 0 0 0-.094 0m-2.375 3.874a1 1 0 0 0-.406 1.875C18.043 9.771 19 11.29 19 13c0 1.722-.972 3.261-2.531 4.219a1 1 0 1 0 1.062 1.687C19.601 17.636 21 15.476 21 13c0-2.461-1.387-4.633-3.438-5.906A1 1 0 0 0 17 6.937a1 1 0 0 0-.094 0"/>
      </svg>
      </button>
        
      <button class="btn btn-sm btn-accent" [routerLink]="['/term', term().id]"
        >Detalles</button>
    </div>
  </div>
</div>
