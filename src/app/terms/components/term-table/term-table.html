<div class="overflow-x-auto">
  <table class="table">
    <!-- head -->
    <thead>
      <tr>
        <th>Término</th>
        <th>Traducción</th>
        <th>Variante</th>
        <th>Detalles</th>
      </tr>
    </thead>
    <tbody>
      <!-- row 1 -->
      @for (term of terms(); track term.id) {
        <tr>
          <!-- <th>
            <label>
              <input type="checkbox" class="checkbox" />
            </label>
          </th> -->
          <td>
            <div class="flex items-center gap-3">
              <div class="avatar">
                <div class="mask mask-squircle h-12 w-12">
                  <img
                    [src]="term.imageUrl | termImage"
                    [alt]="term.content" />
                </div>
              </div>
              <div>
                <a 
                  [routerLink]="['/admin/terms', term.id]"
                  class="font-bold hover:text-accent transition-colors dusration-300">{{ term.content}}</a>
              </div>
            </div>
          </td>
          <td>
            <span class="badge badge-ghost badge-sm">{{term.meaning}}</span>
          </td>

          <td>
            {{term.variant.name}}
          </td>
          
          <td>
            <button 
              [routerLink]="['/admin/terms', term.id]",    
              class="btn btn-accent btn-xs">Ver más</button>
          </td>

          <!-- <th>
            <button 
              [routerLink]="['/admin/terms', term.id]",    
              class="btn btn-error btn-xs">Eliminar</button>
          </th> -->
        </tr>  
       }
      
  </table>
</div>
